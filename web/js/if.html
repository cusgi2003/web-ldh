<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 조건문
        // 조건식의 값이 true면 코드블럭안의 내용을 실행하고, false면 건너뛴다.
        // 조건식은 비교연산자와 논리연산자로 만든다.

        // if(조건식){
        //     조건식이 참일 때 실행할 명령;
        // }

        //조건식에 falsy값이나 truthy값이 들어가는 경우
        let num = 0;
        if(num){
            document.write('참입니다.<br>')
        } else {
            document.write('거짓입니다.<br>')
        }

        num = 100;
        if(num){
            document.write('참입니다.<br>')
        } else {
            document.write('거짓입니다.<br>')
        }

        let name = '';
        if(name){
            document.write('이름이 있습니다.<br>')
        } else {
            document.write('이름이 없습니다.<br>')
        }

        name = '홍길동';
        if(name){
            document.write('이름이 있습니다.<br>')
        } else {
            document.write('이름이 없습니다.<br>')
        }

        let data = null;
        if(data){
            document.write('데이터 있음<br>')
        } else {
            document.write('데이터 없음<br>')
        }

        let score;
        if(score){
            document.write('점수 있음<br>')
        } else {
            document.write('점수 없음<br>')
        }

        let result = Number("abc");

        if(result){
            document.write('숫자 있음<br>')
        } else {
            document.write('숫자 없음<br>')
        }

        //로그인 아이디 입력 여부를 확인해서
        //입력하지 않았으면 '아이디를 입력하세요'라고 경고창 띄우기
        //입력했으면 '로그인 시도'라고 경고창 띄우기

        function login(){
            let id = document.getElementById("id").value;

            if(id){
                alert('로그인 시도');
            } else {
                alert('아이디를 입력하세요');
            }
        }
        




    </script>
</head>
<body>
    <hr>
    <label>
        아이디 
        <input type="text" id="id">
    </label>
    <br><br>
    <button onclick="login()">로그인</button>
    
</body>
</html>
