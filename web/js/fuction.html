<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        //함수
        //하나의 작업을 수행하도록 묶은 재사용 가능한 코드블럭

        //  처리 로직
        //  return 반환값;
        //}

        // 두 수를 더하여 반환하는 add함수 만들기

        //     return x + y;
        // }
        // add(10,7);

        //함수 표현식
        // const add = function(x,y){ return x + y;};
        // add(10,7);

        //화살표 함수
        //※메서드로는 화살표 함수를 사용하지 않는다.
        //java 람다식 규칙과 같다.
        //매개변수가 1개면 소괄호 생략 가능
        //매개변수 없으면 소괄호 사용
        const add = (x, y) => x + y;

        //객체를 반환할 경우 ()로 감싸야 한다.
        const student = () => ({ name: '홍길동' });

        const welcome = () => {
            document.getElementById("result").innerText = "환영합니다.";
        }

        //매개변수와 인자
        //매개변수 : 함수 정의시 값을 받는 변수
        //인자 : 함수를 호출할 때 전달하는 값
        //default 매개변수 : 인자가 없을 때 사용하는 기본값
        const power = (x, n = 2) => { return x ** n; }

        //rest 매개변수
        //매개변수자리에 가변인자를 넣는다.
        //그 값을 배열로 받는다.
        const sum = (...nums) => {
            //[1,2,3,4,5]
            return nums.reduce((a, v) => a + v, 0);
        }

        let result = sum(1, 2, 3, 4, 5);

        document.write(result, "<br>")

        //return
        //return을 만나면 함수를 즉시 종료하고 값을 돌려준다.
        //반환값을 명시하지 않으면 undefined가 반환된다

        const isAdult = (age) => {
            if (age >= 19) {
                return true;
            }

            return false;
        }

        //콜백함수와 고차함수
        //콜백함수 :다른 함수에 인자로 전달되는 함수
        //고차함수 : 함수를 인자로 받거나 함수를 반환하는 함수

        const doubled = [1, 2, 3].map(x => x * 2);
        const evens = [1, 2, 3, 4].filter(x => x % 2 === 0);

        //계산을 하는 함수
        const calculate = (num1, num2, operation) => {
            let result = operation(num1, num2);
        }

        calculate = (10, 7, add);

        //함수를 반환하는 고차함수
        const createHello = () => {
            return () => document.write("안녕하세요");
        }

        const hello = createHello();

        hello();


    </script>
</head>

<body>
    <!-- 버튼을 하나 만든다.
     onclick="welcome()" 속성을 사용한다
     함수는 화살표 함수로 작성한다
     결과는 id="result"인 div에 출력한다. -->
    <button onclick="welcome()">환영하기</button>
    <div id="result"></div>
</body>

</html>
