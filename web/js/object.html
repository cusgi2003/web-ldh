    <script>
        // 객체(Object)
        // 여러가지 속성(필드)과 메서드를 하나로 묶은 데이터 구조
        // JS에서는 객체를 만들기 위해 클래스가 꼭 필요하지는 않다.

        //객체 생성 방법
        //1. 객체 리터럴로 생성하기
        //객체의 구성
        //프로퍼티(속성) -> 키(key) : 값(value)로 구성되어 있다.
        // let 변수명 = {
        //    키 : 값,
        //    키 : 값,
        //    키 : 값
        //}

        let person = {
            user_name : "홍길동",
            age : 25,
            job : "개발자"
        };

        //처음에는 비어있는 객체를 만들 수도 있다.
        let user = {};

        //객체 값 사용하기
        //객체명.키 -> 값을 사용할 수 있다.
        document.write(person.user_name,"<br>");
        document.write(person.age,"<br>");
        document.write(person.job,"<br>");
        //대괄호 표기법
        //객체명["키"]
        document.write(person["user_name"],"<br>");
        document.write(person["age"],"<br>");
        document.write(person["job"],"<br>");

        //객체 값 변경하기
        let product = {

        }

        product.price = 35000;

        document.write(product.price,"<br>");

         user1 = {

        //속성을 추가하기
        person.address = "인천시";
        
        //객체 속성 삭제하기
        delete person.user_name;

        //객체 안에 함수 넣기
        person = {
            name : "김철수",
            age : 20,
            introduce : function(){
                document.write("안녕하세요 저는 김철수 입니다.");
            }
        }

        //객체 안에 들어있는 함수를 메서드라고 한다.
        person.introduce();

        function Student(name,age,score){
            this.name = name;
            this.age = age;
            this.score = score;
        }

        let s1 = new Student("김철수",20,90);
