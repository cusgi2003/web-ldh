<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 공통 스타일 */
        *{
            box-sizing: border-box;
        }

        body{
            margin : 0;
            font-family : sans-serif;
            background: #111827;
            color : white;
        }

        a {
            color : inherit;
            text-decoration: none;
        }

        /* 헤더 영역 */
        header{
            display : flex;
            justify-content: space-between;
            align-items: center;

            padding : 20px 50px;
            background : #030712;
            border-bottom : 1px solid #374151;
        }

        .logo{
            font-size : 28px;
            font-weight : bold;
            color : #ef4444;
        }

        nav{
            display :flex;
            gap : 30px;
        }

        nav a{
            display : inline-block;
            transition : all 0.3s ease;
        }

        nav a:hover{
            color : #ef4444;
            transform : scale(1.2);
        }

        /* 메인 영역 */
        .movie-main{
            max-width : 1100px;
            margin : 70px auto;
            padding : 0 20px;

            display : flex;
            align-items: center;
            gap : 50px;

        }

        .poster-box{
            width : 42%;
            border-radius : 18px;
            overflow : hidden;
            box-shadow : 0 12px 30px rgba(0,0,0,0.45);
        }

        .poster-box img{
            width : 100%;
            height : 520px;
            object-fit: cover;
            display : block;
        }

        .movie-info{
            flex : 1;
        }

        .badge{
            display : inline-block;
            padding : 8px 14px;
            border-radius : 20px;
            background: #ef4444;
            color : white;
            margin-bottom : 18px;
        }

        .movie-info h1{
            margin : 0 0 20px;
            font-size : 48px;
        }

        .movie-info p{
            color : #d1f5db;
            font-size : 18px;
            line-height : 1.7;
        }

        .info-box{
            margin : 28px 0;
            padding : 22px;
            border : 1px solid #374151;
            border-radius : 14px;
            background : #1f2937;
        }

        .button-group{
            display : flex;
            gap : 16px;
        }

        .button-group button{
            padding : 14px 26px;
            border : none;
            border-radius : 8px;
            font-size : 16px;
            cursor :pointer;
        }

        /* 영화 추천 영역 */

        .recommend-section{
            max-width : 1100px;
            margin : 40px auto 80px;
            padding : 0 20px;
        }

        .movie-list{
            display : flex;
            gap : 24px;
        }

        .small-movie{
            flex : 1;
            padding : 22px;
            border-radius : 14px;
            background : #1f2937;
            border : 1px solid #374151;
        }

        /* 푸터영역 */
        footer{
            text-align : center;
            padding : 30px;
            background : #030712;
            color : #d1d5db;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Movie Preview</div>

        <nav>
            <a href="#">상영작</a>
            <a href="#">예매</a>
            <a href="#">이벤트</a>
        </nav>
    </header>

    <main>
        <section class="movie-main">
            <div class="poster-box">
                <img src="https://picsum.photos/500/700?movie-main" alt="영화 포스터 이미지">
            </div>

            <div class="movie-info">
                <span class="badge">이번 주 추천작</span>
                <h1> Shadow City</h1>
                <p>어두운 도시를 배경으로 숨겨진 진실을 추적하는 액션 스릴러</p>

                <div class="info-box">
                    <p><strong>장르:</strong> 액션 /스릴러</p>
                    <p><strong>상영 시간:</strong> 128분</p>
                    <p><strong>관람 등급:</strong> 15세 이상 관람가</p>
                </div>

                <div class="button-group">
                    <button class="primary-btn">예매하기</button>
                    <button class="secondary-btn">상세정보</button>
                </div>
            </div>
        </section>
        <section class="recommend-section">
            <h2>함께 보면 좋은 영화</h2>
            <div class="movie-list">
                <div class="small-movie">
                    <h3>액션 영화</h3>
                    <p>화려한 전투 장면과 빠른 전개가 돋보이는 영화</p>
                </div>

                <div class="small-movie">
                    <h3>액션 영화</h3>
                    <p>화려한 전투 장면과 빠른 전개가 돋보이는 영화</p>
                </div>

                <div class="small-movie">
                    <h3>액션 영화</h3>
                    <p>화려한 전투 장면과 빠른 전개가 돋보이는 영화</p>
                </div>
            </div>
        </section>
    </main>

    <footer> &copy; Movie Preview</footer>
</body>
</html>
