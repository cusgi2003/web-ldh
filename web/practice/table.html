<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .data-table{
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th, 
        .data-table td{
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .data-table tr:first-child{
            background-color: #2c3e50;
            color: #ffffff;
        }
        .data-table tr:nth-child(even) {
            background-color: #f8f9fa;
        }
        .data-table tr:last-child{
            background-color: #eaeded;
            cursor: pointer;
        }

        .data-table tr:not(:first-child):not(:last-child):hover{
            background-color: #ebf5fb;
        }
    </style>
</head>
<body>
    <h1>사원 성과 테이블</h1>
    <table class="data-table">
        <tr>
            <th>사원번호</th>
            <th>이름</th>
            <th>직급</th>
            <th>성과점수</th>
        </tr>

        <tr>
            <td>A001</td>
            <td>김철수</td>
            <td>팀장</td>
            <td>95점</td>
        </tr>

        <tr>
            <td>A002</td>
            <td>이영희</td>
            <td>대리</td>
            <td>88점</td>
        </tr>

        <tr>
            <td>A003</td>
            <td>박민수</td>
            <td>사원</td>
            <td>72점</td>
        </tr>

        <tr>
            <td>A004</td>
            <td>최지우</td>
            <td>사원</td>
            <td>84점</td>
        </tr>

        <tr>
            <th>총계</th>
            <th>4명</th>
            <th>-</th>
            <th>평균 84.75점</th>
        </tr>
    </table>
</body>
</html>
