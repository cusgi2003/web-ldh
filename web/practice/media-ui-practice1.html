<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            box-sizing: border-box;
        }

        body{
            margin: 0;
            font-family: sans-serif;
            color: #333;
            background-color: #f5f6fa;
        }
        
        a{
            color: inherit;
            text-decoration: none;
        }

        .container{
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
        }

        header{
            background-color: #111827;
            color: #fff;
            padding: 16px;
        }

        header h1{
            font-weight: 700;
            margin-bottom: 8px;
        }

        @media(max-width:767px){
            nav{
                display: none;
            }
        }

        @media(min-width:768px){
            nav ul{
                display: flex;
                list-style: none;
                gap: 20px;
                padding: 0;
                margin: 0;
            }
        }

        .layout{
            display: flex;
            flex-direction: column;
            margin-top: 20px;
        }

        main{
            flex: 1 1 auto;
        }

        .posts{
            display: flex;
            flex-direction: column;
            gap: 20px;

            background-color: white;
        }

        .card{
            width: 100%;
            flex: 1 1 calc(50%-12px);
        }

        .thumb{
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
        }

        .content{
            padding: 15px;
        }

        .title{
            font-size: 20px;
            margin: 6px 0 8px;
        }

        .meta{
            font-size: 12px;
            color: #6b7280;
        }

        aside{
            flex: 0 0 260px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>My Blog</h1>
            <nav>
                <ul>
                    <li><a href="#">홈</a></li>
                    <li><a href="#">카테고리</a></li>
                    <li><a href="#">태그</a></li>
                    <li><a href="#">정보</a></li>
                </ul>
            </nav>
        </header>

        <div class="layout">
            <main>
                <section class="posts">
                    <article class="card">
                        <div class="content">
                            <img class="thumb" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ5_nvYdCfYWyUued29KSlzDy40u0D69DDpbA&s"
                            alt="배경 1번">
                            <div class="content">
                            <h3 class="title">포스트 제목 1</h3>
                            <p class="meta">2025-11-04 · 카테고리</p>
                            <p>간단한 소개문장이다</p>
                        </div>
                    </article>

                    <article class="card">
                        <div class="content">
                            <img class="thumb" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQdByLbznuQ3T_d2ij7_3BRZLQBSzt0rvxCrw&s"
                            alt="배경 2번">
                            <div class="content">
                            <h3 class="title">포스트 제목 2</h3>
                            <p class="meta">2025-11-04 · 카테고리</p>
                            <p>간단한 소개문장이다</p>
                        </div>
                    </article>

                    <article class="card">
                        <div class="content">
                            <img class="thumb" src="https://www.10wallpaper.com/wallpaper/medium/2512/Canton_Tower_City_Building_Landmark_Night_View_Guangzhou_China_5K_medium.jpg"
                            alt="배경 3번">
                            <div class="content">
                            <h3 class="title">포스트 제목 3</h3>
                            <p class="meta">2025-11-04 · 카테고리</p>
                            <p>간단한 소개문장이다</p>
                        </div>
                    </article>

                </section>
            </main>

            <aside>
                <h4>사이드바</h4>
                <ul>
                    <li>인기 글</li>
                    <li>최근 댓글</li>
                    <li>카테고리</li>
                </ul>
            </aside>

            <footer>
                <small>© 2025 My Blog. All rights reserved.</small>
            </footer>
        </div>
    </div>
</body>
</html>
