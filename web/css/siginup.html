<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            background-color: #f5f6f7;
            font-family: 'Malgun Gothic', sans-serif;
            padding-top: 40px;
        }

        .register-container{
            width: 500px;
            margin: 0 auto;
            background-color: white;
            border: 1px solid #dadada;
            padding: 30px;
            box-sizing: border-box;
        }

        .register-container h1{
            text-align: center;
        }

        .form-row{
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .row-label{
            width: 100px;
            flex-shrink: 0;
            font-size: 14px;
            color: #333;
        }
        

        .form-row input[type="text"]
        .form-row input[type="password"]{
            flex: 1;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-row button{
            padding: 8px 10px;
            background-color: #f1f3f5;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
            white-space: nowrap;
        }

        .form-row select{
            padding: 8px 10px;
            border: 1ox solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .radio-group{
            display : flex;
            align-items : center;
            gap : 16px;
            font-size : 14px;
        }

        .button-group{
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-submit{
            padding: 10px 24px;
            background-color: #2d6a4f;
            color: white;
            border: 1px solid #2d6a4f;
            border-radius: 4px;
            font-size: 14px;
        }

        .btn-cancel{
            padding: 10px 24px;
            background-color: #fff;
            color: #555;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1>회원가입</h1>

        <!-- 아아디 입력, 중복 확인 버튼 -->
        <div class="form-row">
            <label class="row-label">아이디</label>
            <input type="text" value="아이디를 입력하세요">
            <button type="button">중복확인</button>
        </div>

        <div class="form-row">
            <label class="row-label">비밀번호</label>
            <input type="text" value="아이디를 입력하세요">
        </div>

        <div class="form-row">
            <label class="row-label">이메일</label>
            <input type="text" value="이메일 아이디">
            <span>@</span>
            <select>
                <option>naver.com</option>
                <option>gmail.com</option>
                <option>daum.com</option>
                <option>직접입력</option>
            </select>
        </div>

        <div class="form-row">
            <label class="row-label">주소</label>
            <input type="text" value="주소를 입력하세요">
        </div>

        <div class="form-row">
            <label class="row-label">성별</label>
            <div class="radio-group">
                <input type="radio" name="gender">
                <label for="male">남성</label>
                <input type="radio" name="gender">
                <label for="female">여성</label>
            </div> 
        </div>
        
        <div class="button-group">
            <button type="submit" class="btn-submit">회원가입</button>
            <button class="btn-cancel">취소</button>
        </div>
    </div>
</body>
</html>
