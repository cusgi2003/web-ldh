<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            background-color: #f5f6f7;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            margin: 0;
            padding-top: 30px;
        }

        .register-container{
            width: 500px;
            background-color: white;
            border: 1px solid #dadada;
            padding: 20px;
            box-sizing: border-box;
        }

        .register-container h1{
            text-align: center;
        }

        .form-row{
            display: flex;
            align-items: center;
        }

        .form-row label{
            line-height: 50px;
        }

        .button-group{
            display: flex;
            justify-content: center;
            gap: 15px;
            border-top: 20px;
        }

        .button-group button {
            width: 120px;
            height: 45px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1>회원가입</h1>


        <div class="form-row">
            <label>아이디</label>
            <div>
                <input type="text" value="아이디를 입력하세요">
                <button>중복확인</button>
            </div>
        </div>

        <div class="form-row">
            <label>비밀번호</label>
            <input type="text" value="아이디를 입력하세요">
        </div>

        <div class="form-row">이메일 : <input type="text" value="이메일 입력">@
            <select>
                <option>naver.com</option>
                <option>gmail.com</option>
                <option>daum.com</option>
                <option>직접 입력</option>
            </select>
        </div>
        <div class="form-row">주소 : <input type="text" value="주소를 입력하세요"></div>
        <div class="form-row">성별 : 
            <input type="radio" name="gender"> 남성
            <input type="radio" name="gender"> 여성
        </div>
        
        <div class="button-group"> 
            <button>회원가입</button>
            <button>취소</button>
        </div>
    </div>
</body>
</html>
