<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            margin:0;
            background: #f4f4f4;
        }

        .area-container{
            display: grid;
            grid-template-columns: 180px 1fr 220px;
            gap: 15px;
            margin: 30px auto;
        }

        .header{
            grid-area: headere;
            background-color: #1f2937;
            color: white;
            padding: 20px 30px;
        }
        header h1{
            margin: 0;
        }

        aside{
            grid-area: aside;
            background: white;
            border-right: 1px solid #ddd;
            padding: 20px;
        }

        aside p{
            padding: 12px;
            background: #f3f4f6;
            border-radius: 6px;
        }

        main{
            grid-area: main;
            padding: 12px;
        }

        .cards{
            display: grid;
            grid-template-columns: 1fr 1fr;
            
        }
    </style>
</head>
<body>
    <div class="area-container">
        <header>
            <h1>ABC 소프트웨어</h1>
            <p>기업용 웹 시스템을 개발하는 IT회사입니다.</p>
        </header>

        <nav>
            <p>회사소개</p>
            <p>서비스</p>
            <p>채용정보</p>
            <p>문의하기</p>
        </nav>

        <main>
            <h2>회사 소개</h2>
            <p>ABC소프트웨어는 학원, 병원, 쇼핑몰을 위한 웹 기반 관리 시스템을 개발합니다.
                사용자가 쉽고 빠르게 업무를 처리할 수 있는 서비스를 제공합니다.
            </p>

            <h2>주요 서비스</h2>
            <p>예약 관리, 회원 관리, 결제 관리, 통계 대시보드 기능을 제공합니다.</p>
        </main>

        <aside>
            <h2>고객센터</h2>
            <p>전화 : 02-1234-5678</p>
            <p>운영시간 : 09:00 ~ 18:00</p>
        </aside>

        <footer>
            <p>Copyright 2026 ABC Software</p>
        </footer>
    </div>
</body>
</html>
