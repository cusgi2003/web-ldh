<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품소개</title>

    <style>
        body{
            background-color: #f5f6f7;
            font-family: sans-serif;
        }

        .product-container{
            width: 800px;
            background-color: white;
            border: 1px solid #e1e4e6;
            border-radius: 8px;
            display: flex;
        }

        .product-container img {
            width: 300px;
            height: auto;
            object-fit: cover;
        }

        .product-info {
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .product-info h1{
            font-size: 24px;
            color: #222;
        }

        .price{
            font-size: 28px;
            font-weight: 700;
            color: #e0654b;
        }

        .description{
            font-size: 14px;
            color: #555;
            line-height: 1.5;
        }

        .features{
            list-style: none;
            color: #4a8b6f;
            font-weight: 700;
        }

        .buy-button{
            padding: 12px 28px;
            background-color: #2d6a4f;
            color: white;
            border: #2d5a4f;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="product-container">
        <div class="product-image">
            <img src="../img/product" alt="Wireless Keyboard">
        </div>

        <div>
            <h1>무선 키보드</h1>
            <p class="price">39,000원</p>
            <p class="description">가볍고 조용한 사무용 무선 키보드입니다.</p>
            <ul class="features">
                <li>무선 연결</li>
                <li>조용한 키감</li>
                <li>긴 배터리</li>
            </ul>
            <button class="buy-button">구매하기</button>
        </div>
    </div>
</body>
</html>
