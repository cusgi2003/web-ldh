<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 박스를 화면 중앙에 배치하 */
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;

            font-family: system-ui, sans-serif;
        }

        /* box클래스
        너비 120px
        높이 120px
        테두리 16px
        배경색 #60a5fa
         */
        .box{
            width: 120px;
            height: 120px;
            border-radius: 16px;
            background-color: #60a5fa;
            animation: bounceColor 2.4s ease-in-out infinite alternate;
        }

        .round{
            width: 64px;
            height: 64px;
            border-radius: 50%; /*요소를 완벽한 원으로 만듭니다*/
            border: 6px solid #e5e7eb;
            border-top-color: #3b82f6; /*상단 테두리만 파란색($`#3b82f6`$)으로 덮어씁니다. 
														      이 파란색 부분이 회전하며 움직이는 것처럼 보이는 부분입니다.*/
            animation: spin 1s linear infinite;
        }

        @keyframes bounceColor{
            0%{transform : translateY(0); background-color: #60a5fa;}
            50%{transform: translateY(-24px); background: #f59e0b;}
            100%{transform: translateY(0); background: #8b5cf6;}
        }
        @keyframes spin{
            to{transform: rotate(360deg);}
        }



        .badge{
            display: inline-block;
            padding: 10px 14px;
            border-radius: 999px;
            background: #8e44ad;
            color: white;
            font-weight: 700;
            animation: hop 0.8s steps(4,end) infinite alternate;
            /* steps(단계 수, 위치) : 애니메이션을 일정한 단계로 끊어서
            움직이게 만드는 타이밍 함수 */
        }

        @keyframes hop{
            from{
                transform: translateX(0);
            }

            to{
                transform: translateX(80px);
            }
        }


    </style>
</head>
<body>
    <h1>바운드 박스</h1>
    <div class="box"></div>
    <h1>스피너</h1>
    <div class="round"></div>

    <hr>
    <h2>step 애니메이션</h2>
    <span class="badge">step</span>
</body>
</html>
