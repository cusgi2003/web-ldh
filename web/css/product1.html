<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family : "Malgun Gothic",sans-serif;
            background : #f5f6f8;
            padding : 40px;
        }

        h1{
            margin-bottom : 20px;
        }

        .wrap{
            display : grid;
            /* 내가 구성한 열보다 item이 많으면 자동으로
            다음줄로 넘어간다. */
            grid-template-columns: repeat(3,1fr);
            gap : 20px;
        }

        .card{
            background : white;
            border : 1px solid #ddd;
            border-radius : 10px;
            padding : 20px;
        }

        .card h2{
            font-size : 20px;
            margin-bottom : 10px;
        }

        .card p{
            color : #666;
        }

        .price{
            font-weight : bold;
            color : #222;
            margin : 15px 0;
        }

        .card button{
            width : 100%;
            padding : 10px;
            border : none;
            background : #222;
            color : white;
            border-radius : 6px;
        }
    </style>
</head>
