<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 100px;
            height: 100px;
            background-color: tomato;
            transition: transform 0.5s;
        }

        .box:hover{
            /* transform: translate(150px, 200px); */
            transform: rotate(-45deg);
        }

        /* btn클래스
        내부여백 : 상하 12xp 좌우 24px 
        테두리 없음
        테두리 둥글게 8px
        배경색 : royalblue
        글씨색 : 흰색
        폰트 크기 : 16px
        커서 포인터
        
        마우스 올릴 시
        배경색이 tomato로 바뀌고
        버튼이 위로 3px만큼 이동시ㅣ킥*/
        .btn{
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background-color: royalblue;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover{
            background-color: tomato;
            transform: translate();
        }


    </style>
</head>
<body>
    <!-- transform
     요소를 움직이거나, 회전시키거나 확대/축소하거나 기울이는 기능
     transform : 함수(값)
     
     transform에서 가장 많이 쓰는 요소
     translate() : 이동
     rotate() : 회전
     scale() : 확대/축소
     skew() : 기울이기 -->
     <h1>CSS Transition</h1>
    <p>마우스를 박스 위에 올려보세요</p>
    <div class="box"></div>

    <button class="btn">버튼</button>
</body>
</html>
