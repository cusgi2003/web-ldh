<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- flextbox : 요소들을 한 줄 또는 여러 줄로 자연스럽게 배치하고
     정렬하고 간격을 조절하기 위한 레이아웃 시스템 -->
    <style>
        .box{
            background: #74b9ff;
            color: white;
            padding: 10px;
            margin: 5px;
            border-radius: 6px;
        }

        .block{
            display: block;
            width: 60px;
            height: 40px;
        }

        .inline{
            display: inline;
            width: 30px;
            height: 50px;
        }

        .inline-block{
            display: inline-block;
            width: 100px;
            height: 70px;
        }

        .flex{
            display: flex;
            width: 200px;
            height: 200px;
            justify-content: center;
            align-items: center;
        }

        /* Transform 정렬
        html요소를 이동, 회원, 크기 조정, 기울임을 통해 변형할 수 있는
        CSS 속성
        */

        /* position 속성
        html 문서상에서 요소가 배치되는 방식으 ㄹ결정
        position : static -> 문서 흐름에 따라 자연스럽게 쌓인다.
        position : relative -> 요소의 원래 위치를 벗어날 수 있게 해준다.
        원래 위치를 기준으로 상대적으로 이동된 배치를 해준다.
        position : absolute -> 요소를 문서흐름에서 제거하고 원하는
        좌표로 직접 배치할 수 있게 해준다. 이떄 기준은 가장 가까운 부모이다. */

        .transform-box{
            width: 200px;
            height: 200px;
        }

        .transform-center{
            position: absolute;
            top: 50%;
            left: 50%;
            /* 왼쪽 위 모서기라 화면 정중앙에 오기 때문에
            그만큼 자기 크기의 잘반만큼 땡겨서요소를
            가운데 맞춘다. */
            transform: translate(-50%, -50%);
        }


    </style>
</head>
<body>
    <h3>display : span block</h3>
    <span class="box block">박스 1</span>
    <span class="box block">박스 2</span>

    <h3>display : inline</h3>
    <div class="box inline">div 박스 3</div>
    <div class="box inline">div 박스 4</div>

    <h3>display : inline-block</h3>
    <div class="box block">div 박스 5</div>
    <div class="box block">div 박스 6</div>

    <h3>display : flex</h3>
    <div class="box flex">
        <p중앙 정렬></p>
        <button>로그인</button>
    </div>

    
    <h3>position과 transform을 이용한 중앙 정렬</h3>




</body>
</html>
