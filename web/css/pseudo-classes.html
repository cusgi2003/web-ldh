<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .h-btn{
            background-color: skyblue;
            padding: 10px 20px;
        }

        .h-btn:hover{
            background-color: orange;
        }
        .h-btn:active{
            background-color: red;
        }

        input{
            border: 2px solid gray;
            padding: 10px;
            outline: none;
        }

        input:focus{
            border: 2px solid blue;
        }

        /* 아직 방문하지 않은 상태 */
        a:link{
            color: #3498db;
        }

        /* 방문한 상태 */
        a:visited{
            color: #e74c3c
        }

        /* + : 인접한 태그를 선택 */
        input:checked + label{
            color: #2ecc71;
            font-weight: bold;
        }

        input:enabled{
            background-color: #ecf0f1;
        }
        input:disabled{
            background-color: #bdc3c7;
        }
        input:required{
            border: 2px solid orange;
        }

        input:invalid{
            outline: none;
            border-color: red;
        }

        ul li:first-child{
            font-weight: bold;
            color: #2980b9;
        }

        ul li:last-child{
            font-weight: bold;
            color: red;
        }

        ul li:nth-child(3){
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>
    <h2>동적 의사 클래스</h2>
    <!-- 동적 의사 클래스
     사용자의 동작에 따라 상태가바뀌는 의사 클래스 -->
     <button class="h-btn">버튼</button>
     <br><br>

     <input type="text" placeholder="이름입력">
     <br><br>

     <a href="https://www.naver.com">Example 링크</a>

     <!-- link -> visited -> hover -> active -->



    <h2>상태 의사 클래스</h2>
    <input type="checkbox" id="chk1">
    <label for="chk1">동의합니다.</label>

    <br><br>

    <input type="text" placeholder="입력가능">
    <input type="text" disabled placeholder="입력불가능">

    <br><br>

    <input type="text" required placeholder="필수사항">


    <hr>

    <h2>구조 의사 클래스</h2>
    <ul>
        <li>첫 번째 항목</li>
        <li>두 번째 항목</li>
        <li>세 번째 항목</li>
    </ul>

    <p>첫 번째 문단</p>
    <p>두 번째 문단</p>
    <div>이것은 div 문단</div>

</body>
</html>
