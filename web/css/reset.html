<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Reset CSS
     브라우저가 기본적으로 적용하는 CSS 스타일을 초기화하는 코드이다.
     HTML 태그들은 CSS를 작성하지 않아도 기본 스타일이 존재한다. 
     
     h1 -> 글자가 크고 굵다
     p -> 위아래 여백이 있다
     ul -> 왼쪽 들여쓰기가 있다 
     
     개발자가 원하는 디자인을 처음부터 통일해서 만들기 위해 사용한다.-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reset-css@5.0.2/reset.min.css">

    <style>

        /* h1 #2980b9 */

        h1{
            color: #2980b9;
            font-size: 32px;
            font-weight: bold;
        }
        
        /* p 태그 배경 #ecf0f1, 안쪽 여백 10px, 테두리 둥글게 6px*/
        p{
            background-color: #ecf0f1;
            padding: 10px;
            border-radius: 6px;
        }

    </style>
</head>
<body>
    <h1>Normalize.css</h1>

    <h2>리스트 비교</h2>

    <ul>
        <li>HTML 기본 리스트 스타일</li>
        <li>reset.css 적용 시 브라우저별 일관된 출력</li>
        <li>Normalize는 어느정도 남겨둔다.</li>
    </ul>
</body>
</html>
