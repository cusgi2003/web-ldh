<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>갤러리 카드</title>
    
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        body{
            background-color: #f5f6f7;
            padding: 40px 20px;
        }

        .gallery-container{
            width: 1000px;
            margin: 0 auto;
        }
        .gallery-container h1{
            text-align: center;
            font-size: 28px;
            color: #222;
            margin-bottom: 30px;
        }

        .card-list{
            display: flex;
            justify-content: space-between;
        }

        .card{
            width: 300px;
            height: 300px;
            border: 1px solid #e0e0e0;
            padding: 15px;
            background-color: white;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="gallery-container">
        <h1>갤러리</h1>
        <div class="card-list">
            <div class="card">
                <img src="../img/spring.jpg" alt="Spring">
                <p class="card-info"> 봄 풍경</p>
                <p>따뜻한 봄날의 풍경입니다.</p>
                <button class="show-btn">자세히 보기</button>
            </div>

            <div class="card">
                <img src="../img/spring.jpg" alt="Summer">
                <p class="card-info"> 여름 풍경</p>
                <p>시원하고 푸른 여름 바다입니다.</p>
                <button class="show-btn">자세히 보기</button>
            </div>

            <div class="card">
                <img src="../img/spring.jpg" alt="Autumn">
                <p class="card-info"> 가을 풍경</p>
                <p>붉게 물든 가을 단풍풍경입니다.</p>
                <button class="show-btn">자세히 보기</button>
            </div>
        </div>
    </div>
</body>
</html>
