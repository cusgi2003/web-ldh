<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>실무형 로그인 화면 실습</title>
</head>
<body>

    <div class="login-box">
        <h2>멤버 로그인</h2>

        <div class="login-main-row">
            
            <div class="input-container">
                <div class="input-field">
                    <label for="user-email">이메일</label>
                    <input type="email" id="user-email" placeholder="이메일 주소 입력">
                </div>
                <div class="input-field">
                    <label for="user-pw">비밀번호</label>
                    <input type="password" id="user-pw" placeholder="비밀번호 입력">
                </div>
            </div>

            <div class="button-container">
                <button type="submit">로그인</button>
            </div>

        </div>

        <div class="login-options">
            <div class="remember-id">
                <input type="checkbox" id="save-id">
                <label for="save-id">아이디 저장</label>
            </div>
        </div>
    </div>

</body>
</html>
