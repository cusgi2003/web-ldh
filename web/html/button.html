<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        button{
            height: 100px;
            background-color: cornflowerblue;
            color: white;
            font-size: 24px;
            border: 1px solid black;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- HTML에서 버튼을 만드는 방법 -->
     <button>
        <strong>클릭하세요</strong>
     </button>

     <!-- input태그의 type 속성을 button으로 주기 
      종료 태그가 없다
      글자는 value속성으로 지정
      html 태그 삽입이 불가능하다. -->
      <input type="button" value="input 버튼">
</body>
</html>
